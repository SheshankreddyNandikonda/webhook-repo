<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Activity</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      color: #24292e;
      min-height: 100vh;
    }

    header {
      background: #24292e;
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    header span { color: #58a6ff; }
    #container {
      max-width: 780px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #57606a;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .event-card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: box-shadow 0.15s;
    }

    .event-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      margin-top: 2px;
    }

    .PUSH           { background: #dafbe1; color: #1a7f37; border: 1px solid #aceebb; }
    .PULL_REQUEST   { background: #ddf4ff; color: #0969da; border: 1px solid #a5d6fb; }
    .MERGE          { background: #fbefff; color: #8250df; border: 1px solid #d2b0ff; }

    .message {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #24292e;
    }

    .message strong { color: #0969da; }

    #status-bar {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: #8c959f;
    }

    #status-bar .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2da44e;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .empty {
      text-align: center;
      padding: 48px 0;
      color: #8c959f;
      font-size: 0.95rem;
    }

    .empty svg { display: block; margin: 0 auto 12px; opacity: 0.3; }
  </style>
</head>
<body>

  <header>
    <span>GitHub</span>&nbsp;Activity Tracker
  </header>

  <div id="container">
    <h2>Latest Repository Events</h2>
    <div id="feed">
      <div class="empty">Loading events...</div>
    </div>
    <div id="status-bar">
      <span class="dot"></span>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <script>
    function getActionLabel(action) {
      if (action === "PULL_REQUEST") return "PULL RQ";
      return action;
    }

    function buildMessage(e) {
      const author = `<strong>${e.author}</strong>`;
      const from   = `<strong>${e.from_branch}</strong>`;
      const to     = `<strong>${e.to_branch}</strong>`;
      const time   = e.timestamp;

      if (e.action === "PUSH")
        return `${author} pushed to ${to} on ${time}`;
      if (e.action === "PULL_REQUEST")
        return `${author} submitted a pull request from ${from} to ${to} on ${time}`;
      if (e.action === "MERGE")
        return `${author} merged branch ${from} to ${to} on ${time}`;
      return "Unknown event";
    }

    async function fetchEvents() {
      try {
        const res = await fetch("/events");
        if (!res.ok) throw new Error("Network error");
        const events = await res.json();

        const feed = document.getElementById("feed");

        if (events.length === 0) {
          feed.innerHTML = `
            <div class="empty">
              <svg width="32" height="32" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 9.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                <path fill-rule="evenodd" d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0z"/>
              </svg>
              No events yet. Push a commit or open a pull request on action-repo.
            </div>`;
        } else {
          feed.innerHTML = events.map(e => `
            <div class="event-card">
              <span class="badge ${e.action}">${getActionLabel(e.action)}</span>
              <span class="message">${buildMessage(e)}</span>
            </div>`).join("");
        }

        document.getElementById("status-text").textContent =
          `Last updated: ${new Date().toLocaleTimeString()} — refreshing every 15 seconds`;

      } catch (err) {
        document.getElementById("status-text").textContent =
          "Connection error. Retrying...";
      }
    }

    // Initial fetch + poll every 15 seconds
    fetchEvents();
    setInterval(fetchEvents, 15000);
  </script>

</body>
</html>
